[hud]
data_dir = "~/.flow_hud"

[plugins]
# 普通插件列表
plugins = ["mouse-radar"]
# 高权限插件列表（IPC 插件必须在此列表中，因为它需要 HudAdminContext）
admin_plugins = ["ipc-client"]
safe_mode = false

[connection]
transport = "tcp"
host = "127.0.0.1"
port = 54321
# socket_path is used when transport = "unix"
socket_path = "/absolute/path/to/daemon.sock"

[ipc_client]
# Runtime tuning defaults for ipc-client plugin
thread_join_timeout_s = 5.0
retry_initial_backoff_s = 0.2
retry_max_backoff_s = 2.0
retry_backoff_multiplier = 1.5
retry_backoff_jitter_ratio = 0.1
retry_error_sleep_s = 1.0
stop_poll_interval_s = 0.1
rpc_capabilities = []
push_capabilities = ["push.timer"]

[extensions]
# 插件专属配置
[extensions.ipc-client]
# Plugin-level override with highest priority
# transport = "unix"
# socket_path = "/absolute/path/to/daemon.sock"
# retry_initial_backoff_s = 0.1

[worker]
max_retries = 2

[hook_breaker]
hook_timeout = 0.5
failure_threshold = 5
recovery_timeout = 60.0
dev_mode = false
