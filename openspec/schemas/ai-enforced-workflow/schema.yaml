name: ai-enforced-workflow
version: 5
description: Spec-driven workflow with risk tiers, anti-abstraction guardrails, verifier-subagent-first review, and Gemini second-opinion verification/repair loops
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, removals, and workflow or skill impacts.
      Mark breaking changes with **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes
          a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: List existing capabilities whose
          REQUIREMENTS are changing. Only include if spec-level behavior changes.

      - **Risk Tier**: Classify the change as `LIGHT`, `STANDARD`, or `STRICT`.
        Justify the tier using concrete triggers such as scope, public
        interfaces, migrations, concurrency/state complexity, or reference
        alignment.

      - **Impact**: Affected code, APIs, dependencies, systems, and which skills
        are expected to participate (for example `openspec-align`,
        `openspec-architect`, `openspec-artifact-verify`).


      IMPORTANT:

      - The Capabilities section is the contract between proposal and specs.
      - The Risk Tier controls how strict later design and verification steps
        must be.
      - Do not use abstract labels like "improve architecture" without naming
        concrete capabilities or artifacts that will change.


      Keep it concise. Focus on the "why" and the change boundary; implementation
      details belong in design.md.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      - Modified capabilities: use the existing spec folder name from
        `openspec/specs/<capability>/`


      Delta operations (use `##` headers):

      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
        content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
        and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - Every requirement MUST have at least one scenario


      For workflow and architecture-related capabilities, requirements MUST be
      testable as document or process checks, not only as code behavior.


      If the proposal classifies the change as `STRICT`, ensure the specs are
      precise enough to support artifact verification and repair routing.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.


      When to include design.md (create if any apply):

      - Cross-cutting change or new architectural pattern
      - New external dependency or significant data model change
      - Security, performance, migration, or workflow-gating complexity
      - Ambiguity that benefits from technical decisions before coding
      - Proposal risk tier is `STANDARD` or `STRICT`


      Required sections:

      - **Context**
      - **Goals / Non-Goals**
      - **Decisions**
      - **Risks / Trade-offs**
      - **Migration Plan**
      - **Open Questions**


      Each key Decision MUST include:

      - The problem being solved
      - Alternatives considered
      - Why this option was chosen
      - At least one verification hook


      ANTI-ABSTRACTION GUARDRAILS:

      Do not stop at high-level concepts. For each important mechanism or
      boundary, provide the level of detail required by the risk tier:

      - **Stack Equivalent**: What is the concrete construct in this project or
        stack? (interface, schema, DTO, trait, manifest, state table, etc.)
      - **Named Deliverables**: Name the concrete deliverables, not only the
        mechanism.
      - **Failure Semantics**: Define failure, retry, fallback, veto, rejection,
        or recovery behavior where relevant.
      - **Boundary Examples**: Give at least one concrete example of caller,
        payload, forbidden leak, and returned form for each critical boundary.
      - **Contrast Structure**: Show current vs target, option A vs option B,
        replicate vs adapt, or allow vs forbid where a trade-off matters.
      - **Verification Hook**: State how the claim will later be verified.


      SKILL ORCHESTRATION:

      - If the change references, aligns with, or replicates an existing system,
        use `openspec-align` before finalizing design decisions.
      - Use `openspec-architect` for architectural comparisons, stack
        equivalents, and decision framing.
      - All verification stages MUST use the shared sequence
        `verify-sequence/default` defined in
        `openspec/schemas/ai-enforced-workflow/verification-sequence.md`.
      - The shared sequence policy applies to any `ai-enforced-workflow` change
        regardless of project domain.
      - `STANDARD` and `STRICT` changes MUST describe two-stage verification:
        read-only verifier subagent (`verify-reviewer`) review first, then
        Gemini second opinion only when policy requires it.
      - `openspec-artifact-verify` and `openspec-verify-change` MUST stay thin
        and delegate orchestration to the shared sequence instead of restating
        the flow.
      - Human-only confirmation does not satisfy a verification gate.
      - If the risk tier is `STRICT`, design.md MUST be reviewable by
        `openspec-artifact-verify` without requiring unstated assumptions.


      INDEPENDENT VERIFIER PLAN (required for `STANDARD` and `STRICT`):

      For each independent verification step, design.md MUST document:

      - Sequence reference:
        `openspec/schemas/ai-enforced-workflow/verification-sequence.md#verify-sequence/default`
      - Verifier agent path:
        `.codex/agents/verify-reviewer.toml` (read-only, normalized JSON only)
      - Verifier invocation method:
        built-in subagent API path in the main process (shell-based codex
        invocation is fallback-only)
      - Verifier invocation template:
        `verify-reviewer-inline-v1` from shared sequence, including parameter
        mapping for bundle fields and output/report paths
      - Verifier runtime profile source:
        `.codex/agents/verify-reviewer.toml`
      - Minimal verification bundle fields (defined once and reused):
        `change / mode / risk_tier / evidence_paths_or_diff_scope / findings_contract / retry_policy`
      - Stateless verify/fix loop semantics:
        each verification rerun uses a fresh verifier instance with no inherited
        verifier memory
      - Supported continuation overrides:
        `verify-only`, `dry-run`, `manual_pause` only
      - Gemini policy: mandatory only for `STRICT` or explicitly dual-gated
        checkpoints
      - Runner contract ID (`gemini-capture`), prompt inputs, raw report path,
        `report_path`, maximum attempts, JSON-response requirement, and
        command-resolution evidence path
      - Fallback behavior (retry once, attempt raw-envelope normalization into
        `report_path`, then block if recovery also fails)
      - Skill entry point that invokes/consumes the step
        (`openspec-artifact-verify`, `openspec-verify-change`,
        `openspec-repair-change`)


      REVIEW GATE:

      Before finalizing design.md, include enough structure for verifier-subagent
      review and tier-gated Gemini second opinion through
      `verify-sequence/default` to check
      Completeness, Correctness, and Coherence. Missing guardrails that affect
      a `STRICT` change are blocking.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the checkbox format exactly.**

      - Group related tasks under numbered `##` headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Order tasks by dependency
      - Keep tasks anchored to concrete deliverables


      REQUIRED TASK PROPERTIES:

      - Tasks MUST name concrete outputs (files, schemas, skills, templates,
        reports, commands, tests)
      - Tasks MUST include verification work, not only implementation work
      - Tasks for workflow or skill behavior MUST mention how the behavior will
        be exercised or audited
      - For each independent verification step in `STANDARD` or `STRICT`
        changes, tasks MUST reference shared sequence
        `verify-sequence/default`, name the minimal verification bundle fields,
        name verifier output/report paths, define routing target and retry
        policy, and require fresh verifier instances for each rerun without
        duplicating shell-specific command bodies


      RISK-TIER GATING:

      - `LIGHT`: verifier-subagent review and optional Gemini second opinion
        unless dual-gated
      - `STANDARD`: include explicit verifier-subagent review, shared
        sequence planning, and tier-gated implementation second-opinion
        verification before sync/archive
      - `STRICT`: include explicit verifier-subagent review, mandatory
        Gemini second-opinion checkpoints for artifact and implementation
        verification, repair-loop rerun coverage, and exercise tasks


      ANTI-ABSTRACTION RULES:

      - Avoid abstract tasks like "improve architecture" or "set up mechanism"
      - Prefer named deliverables such as "Define findings output fields in
        skill X" or "Update schema instruction to require boundary examples"
      - If a task creates a critical design rule, also add the task that proves
        the rule can be checked


      CHECKPOINTS:

      Any task group that modifies core workflow gates, verification logic, or
      repair routing MUST end with a checkpoint task in this exact format:

      - [ ] X.Y [Checkpoint] Run verifier-subagent review using
        `verify-sequence/default` for [specific output: schema diff / skill
        output / exercise log / verification report]. Write authoritative
        verifier-subagent findings JSON and verifier execution evidence JSON, and run
        Gemini second opinion when required by risk tier or
        explicit dual gate through logical runner contract `gemini-capture`.
        Use verifier invocation template `verify-reviewer-inline-v1` from the shared
        sequence for built-in invocation organization.
        MUST write both the raw Gemini envelope and normalized JSON report when
        Gemini runs. If primary Gemini execution fails after writing raw, use
        the contract recovery step (`input_raw_path` -> `report_path`) before
        blocking. Document originating phase using canonical values
        `artifact_gate`, `apply`, or `implementation_verify`, plus the expected
        continuation target on pass. Only `verify-only`, `dry-run`, and
        `manual_pause` may override automatic continuation. Each rerun MUST use
        a fresh verifier instance (no inherited
        memory). Record active resolved command in execution evidence, not task
        policy prose.


      SKILL AWARENESS:

      Reference the expected skills when tasks depend on them
      (`openspec-align`, `openspec-architect`, `openspec-artifact-verify`,
      `openspec-repair-change`, `openspec-verify-change`). Verify-related
      skills MUST use shared sequence `verify-sequence/default`.
    requires:
      - specs
      - design

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, and mark complete as you go.

    For any verification or checkpoint task in `ai-enforced-workflow`:
    - execute shared sequence `verify-sequence/default` from
      `openspec/schemas/ai-enforced-workflow/verification-sequence.md`
    - use verifier agent `.codex/agents/verify-reviewer.toml` in read-only mode
      with bundle fields:
      `change / mode / risk_tier / evidence_paths_or_diff_scope / findings_contract / retry_policy`
    - invoke verifier through built-in subagent API using template
      `verify-reviewer-inline-v1`; keep invocation metadata auditable in
      execution logs/evidence (`agent_id/start_at/end_at/final_state`)
    - require `findings_contract=shared-findings-v1`; unsupported contract id
      blocks the checkpoint before verification
      - malformed or contract-violating verifier-subagent findings output is an immediate
        blocker; enforce at least `id` uniqueness, stable `id` across consecutive
        reruns for unchanged unresolved findings, `auto_fixable`/`redirect_layer`
        constraints, and `SUGGESTION => blocking=false`; Gemini recovery applies
        only to the Gemini runner (`gemini-capture`) raw/report contract
      - verification evidence is authoritative only when both verifier-subagent
        findings JSON and verifier execution evidence JSON exist; hand-written markdown
        summaries do not satisfy the gate
      - auto-repair implementation only when
        `mode=implementation && redirect_layer=implementation && auto_fixable=true`
    - after any auto-fix attempt, rerun with a fresh verifier instance; stop and
      route when the same blocking finding (`id` + `redirect_layer`) repeats
    - use separate retry budgets for artifact reruns and implementation
      auto-fix loops, as defined by the shared sequence
    - route blocking non-implementation or blocking non-auto-fixable findings to
      `openspec-repair-change`; policy-acceptable non-blocking warnings may pass
      without repair routing
    - do not substitute user confirmation for verification
